# Cloudflare Worker config.
# "name" becomes part of the deployed URL: https://<name>.<account>.workers.dev
name = "dannybimma-likes"

# Path to the Worker entry file (the default export in this file is what runs).
main = "src/index.js"

# Pins the Workers runtime to a specific date so behavior doesn't drift.
compatibility_date = "2025-01-01"

# Binds a Workers KV namespace to the Worker under the name env.LIKES.
# Create the namespace first, then paste the id Wrangler prints here:
#   npx wrangler kv:namespace create LIKES
[[kv_namespaces]]
binding = "LIKES"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
